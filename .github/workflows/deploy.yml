# 🌰 GitVuln Watch — Deploy Pipeline 🌰
name: Deploy Product

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 8 * * 1'  # 🌰 Weekly on Monday at 08:00 UTC 🌰
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 🌰 Checkout
      - name: Checkout 🌰
        uses: actions/checkout@v4

      - name: Setup Node.js 🌰
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🌰 Fetch vulnerability data from GitHub Advisory Database
      - name: Fetch advisories 🌰
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/api-call.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🌰 Generate AI intelligence brief using GitHub Models
      - name: AI analysis 🌰
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: node scripts/ai-analysis.js
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}

      # 🌰 Commit updated data
      - name: Commit changes 🌰
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitVuln Watch 🌰"
          git add data/
          if ! git diff --staged --quiet; then
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "🌰 Scheduled update - $(date -u '+%Y-%m-%d %H:%M') 🌰"
            else
              git commit -m "🌰 Manual update - $(date -u '+%Y-%m-%d %H:%M') 🌰"
            fi
            git push
          fi

      # 🌰 Deploy to GitHub Pages
      - name: Setup Pages 🌰
        uses: actions/configure-pages@v5
      - name: Upload Pages 🌰
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to Pages 🌰
        id: deployment
        uses: actions/deploy-pages@v4
